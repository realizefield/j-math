<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EF06 因数分解② 【例題】</title>
<style>
:root{--primary:#0e7490;--primary-light:#cffafe;--accent:#e8372d;--accent-light:#fff1f0;--success:#16a34a;--success-light:#dcfce7;--warn:#d97706;--warn-light:#fffbeb;--bg:#ecfeff;--card:#ffffff;--border:#a5f3fc;--text:#1e293b;--text-sub:#64748b;--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','BIZ UDP Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
.g-container{max-width:760px;margin:0 auto;padding:22px 15px 60px;}
.page-header{background:var(--primary);color:#fff;padding:16px 20px 12px;text-align:center;box-shadow:0 3px 10px rgba(14,116,144,.25);}
.page-header .unit-code{font-size:.8em;opacity:.8;letter-spacing:.1em;margin-bottom:3px;}
.page-header h1{font-size:clamp(.98em,3vw,1.38em);font-weight:700;margin:0;line-height:1.4;}
.step-nav{display:flex;align-items:center;justify-content:center;padding:9px 6px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;position:sticky;top:0;z-index:10;gap:1px;}
.step-item{display:flex;align-items:center;gap:3px;font-size:clamp(.62em,1.6vw,.78em);color:#94a3b8;white-space:nowrap;padding:2px 4px;}
.step-item a{color:inherit;text-decoration:none;}
.step-item.active{color:var(--primary);font-weight:700;}
.step-circle{width:19px;height:19px;border-radius:50%;font-size:.68em;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-item.active .step-circle{background:var(--primary);color:#fff;}
.step-item:not(.active) .step-circle{background:#94a3b8;color:#fff;}
.step-arrow{color:#cbd5e1;font-size:.9em;padding:0;}
.instruction{background:var(--primary-light);border-left:4px solid var(--primary);border-radius:0 var(--radius) var(--radius) 0;padding:12px 15px;margin-bottom:18px;font-size:.93em;color:var(--primary);line-height:1.7;}
.tip3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px;}
.tip3 div{border-radius:8px;padding:7px;font-size:.78em;font-weight:700;text-align:center;line-height:1.4;}
.nav-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;margin-top:26px;}
.btn-nav{font-family:'BIZ UDPGothic','BIZ UDP Gothic',sans-serif;font-size:.93em;font-weight:700;padding:11px 24px;border-radius:50px;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .15s,box-shadow .15s;}
.btn-nav:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.btn-f{background:var(--primary);color:#fff;}
.btn-b{background:#f1f5f9;color:var(--text-sub);}
.btn-h{background:#cffafe;color:#0e7490;font-size:.83em;padding:9px 18px;}
.ex-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
.ex-head{padding:10px 15px;font-size:.86em;font-weight:700;display:flex;align-items:center;gap:8px;}
.ex-head.teal{background:var(--primary);color:#fff;}
.ex-head.green{background:#15803d;color:#fff;}
.ex-head.orange{background:#ea580c;color:#fff;}
.ex-num{background:rgba(255,255,255,.25);border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:.78em;flex-shrink:0;}
.ex-body{padding:14px 16px 8px;}
.sr{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:8px;margin-bottom:7px;font-size:.88em;font-weight:700;line-height:2.1;animation:fadeIn .3s ease;}
.sr.y{background:var(--warn-light);border:1.5px solid var(--warn);}
.sr.b{background:var(--primary-light);border:1.5px solid var(--primary);}
.sr.g{background:var(--success-light);border:1.5px solid var(--success);}
.sl{font-size:.68em;font-weight:700;border-radius:5px;padding:2px 7px;white-space:nowrap;flex-shrink:0;margin-top:4px;}
.sl.y{background:var(--warn);color:#fff;}
.sl.b{background:var(--primary);color:#fff;}
.sl.g{background:var(--success);color:#fff;}
.ans-box{background:var(--primary-light);border:2px solid var(--primary);border-radius:9px;padding:10px 14px;margin-bottom:8px;font-size:1.05em;font-weight:700;color:var(--primary);text-align:center;line-height:2.1;animation:fadeIn .3s ease;}
.next-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:11px;font-family:'BIZ UDPGothic',sans-serif;font-size:.93em;font-weight:700;cursor:pointer;margin-bottom:11px;}
.done-badge{text-align:center;padding:6px;font-size:.84em;font-weight:700;color:var(--success);margin-bottom:10px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="page-header">
  <div class="unit-code">EF06</div>
  <h1>因数分解②<br><small style="font-size:.75em;opacity:.85;">完全平方・共通因数・置き換え応用</small></h1>
</div>
<nav class="step-nav">
  <div class="step-item"><span class="step-circle">①</span><a href="../ef01/intro.html">展開の基本</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">②</span><a href="../ef02/intro.html">平方公式</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">④</span><a href="../ef04/intro.html">因数分解①差の積</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">⑤</span><a href="../ef05/intro.html">因数分解②</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item active"><span class="step-circle">⑥</span><span>因数分解③</span></div>
</nav>
<nav class="step-nav" style="border-top:1px solid var(--border);">
  <div class="step-item"><span class="step-circle">①</span><a href="intro.html">導入</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item active"><span class="step-circle">②</span><span>例題</span></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">③</span><a href="drill.html">演習</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">④</span><a href="check.html">確認</a></div>
</nav>
<main class="g-container">
<div class="instruction"><strong>【例題】</strong>　ボタンをタップして，考え方 → 答えの順に確認しよう！</div>
<div class="tip3">
  <div style="background:var(--primary-light);color:var(--primary);">完全平方<br>(χ±a)²</div>
  <div style="background:#dcfce7;color:#15803d;">共通因数<br>をくくる</div>
  <div style="background:var(--warn-light);color:var(--warn);">置き換え<br>A→因数分解→戻す</div>
</div>
<div id="ex-area"></div>
<div class="nav-btns">
  <a href="../ef_index.html" class="btn-nav btn-h">🏠 単元一覧へ</a>
  <a href="intro.html" class="btn-nav btn-b">← 導入</a>
  <a href="drill.html" class="btn-nav btn-f">③ 演習へ →</a>
</div>
</main>
<script>
const EXAMPLES=[
  {title:"完全平方の因数分解（プラス）",head_cls:"teal",q:"χ²＋6χ＋9",
    steps:[
      {cls:"y",lbl:"確認",txt:"9＝3²，6χ＝2×3×χ → 完全平方！"},
      {cls:"b",lbl:"公式",txt:"χ²＋2×3×χ＋3²＝(χ＋3)²"},
    ],ans:"<strong>(χ＋3)²</strong>"},
  {title:"完全平方の因数分解（マイナス）",head_cls:"teal",q:"χ²－12χ＋36",
    steps:[
      {cls:"y",lbl:"確認",txt:"36＝6²，12χ＝2×6×χ → 完全平方！"},
      {cls:"b",lbl:"公式",txt:"χ²－2×6×χ＋6²＝(χ－6)²"},
    ],ans:"<strong>(χ－6)²</strong>"},
  {title:"完全平方（前がχ以外）",head_cls:"teal",q:"4χ²－20χ＋25",
    steps:[
      {cls:"y",lbl:"確認",txt:"4χ²＝(2χ)²，25＝5²，20χ＝2×2χ×5 → 完全平方！"},
      {cls:"b",lbl:"公式",txt:"(2χ)²－2×2χ×5＋5²＝(2χ－5)²"},
    ],ans:"<strong>(2χ－5)²</strong>"},
  {title:"共通因数をくくり出してから分解",head_cls:"green",q:"2χ²＋2χ－12",
    steps:[
      {cls:"b",lbl:"くくる",txt:"全項を2でわれる → 2(χ²＋χ－6)"},
      {cls:"g",lbl:"分解",txt:"χ²＋χ－6：かけて－6，たして1 → 3と－2 → (χ＋3)(χ－2)"},
    ],ans:"<strong>2(χ＋3)(χ－2)</strong>"},
  {title:"共通因数（文字）",head_cls:"green",q:"aχ²＋5aχ－36a",
    steps:[
      {cls:"b",lbl:"くくる",txt:"全項にaあり → a(χ²＋5χ－36)"},
      {cls:"g",lbl:"分解",txt:"χ²＋5χ－36：かけて－36，たして5 → 9と－4 → (χ＋9)(χ－4)"},
    ],ans:"<strong>a(χ＋9)(χ－4)</strong>"},
  {title:"置き換えを使う応用①",head_cls:"orange",q:"(χ＋3)²＋(χ＋3)－6",
    steps:[
      {cls:"b",lbl:"置換",txt:"χ＋3＝A とおく → A²＋A－6"},
      {cls:"b",lbl:"分解",txt:"A²＋A－6：かけて－6，たして1 → (A＋3)(A－2)"},
      {cls:"g",lbl:"戻す",txt:"A＝χ＋3 を戻す → (χ＋3＋3)(χ＋3－2)＝(χ＋6)(χ＋1)"},
    ],ans:"<strong>(χ＋6)(χ＋1)</strong>"},
  {title:"置き換えを使う応用②（差の積）",head_cls:"orange",q:"(χ＋y)²－9",
    steps:[
      {cls:"b",lbl:"置換",txt:"χ＋y＝A とおく → A²－9＝A²－3²"},
      {cls:"b",lbl:"分解",txt:"(A＋3)(A－3)"},
      {cls:"g",lbl:"戻す",txt:"A＝χ＋y → (χ＋y＋3)(χ＋y－3)"},
    ],ans:"<strong>(χ＋y＋3)(χ＋y－3)</strong>"},
];
const state=EXAMPLES.map(()=>0);
function buildAll(){
  const area=document.getElementById('ex-area');
  EXAMPLES.forEach((ex,i)=>{
    const div=document.createElement('div');div.className='ex-card';div.id='ec'+i;
    div.innerHTML='<div class="ex-head '+ex.head_cls+'"><span class="ex-num">'+(i+1)+'</span>'+ex.title+'</div>'
      +'<div class="ex-body"><div style="font-size:1.1em;font-weight:700;margin-bottom:10px;color:var(--primary);">'+ex.q+'</div>'
      +'<div id="steps'+i+'"></div>'
      +'<button class="next-btn" id="btn'+i+'" onclick="nextStep('+i+')">💡 考え方を見る</button>'
      +'<div id="done'+i+'" class="done-badge" style="display:none;">✅ 完了！</div></div>';
    area.appendChild(div);
  });
}
function nextStep(i){
  const ex=EXAMPLES[i],cur=state[i];
  const sd=document.getElementById('steps'+i),btn=document.getElementById('btn'+i),done=document.getElementById('done'+i);
  if(cur<ex.steps.length){
    const s=ex.steps[cur];const row=document.createElement('div');row.className='sr '+s.cls;
    row.innerHTML='<span class="sl '+s.cls+'">'+s.lbl+'</span><div>'+s.txt+'</div>';
    sd.appendChild(row);state[i]++;btn.textContent=state[i]<ex.steps.length?'➡ 次のステップへ':'✅ 答えを見る';
  }else{
    const ab=document.createElement('div');ab.className='ans-box';ab.innerHTML='答え：'+ex.ans;
    sd.appendChild(ab);btn.style.display='none';done.style.display='block';
  }
}
buildAll();
</script>
</body>
</html>
