<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC05 単項式の乗除 【例題】</title>
<style>
:root{--primary:#1a56a0;--primary-light:#dbeafe;--accent:#e8372d;--accent-light:#fff1f0;--success:#16a34a;--success-light:#dcfce7;--warn:#d97706;--warn-light:#fffbeb;--bg:#f0f6ff;--card:#ffffff;--border:#c7d9f5;--text:#1e293b;--text-sub:#64748b;--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','BIZ UDP Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
.g-container{max-width:760px;margin:0 auto;padding:24px 16px 60px;}
.page-header{background:var(--primary);color:#fff;padding:18px 24px 14px;text-align:center;box-shadow:0 3px 10px rgba(26,86,160,.25);}
.page-header .unit-code{font-size:.82em;opacity:.8;letter-spacing:.1em;margin-bottom:4px;}
.page-header h1{font-size:clamp(1.1em,3vw,1.55em);font-weight:700;margin:0;}
.step-nav{display:flex;align-items:center;justify-content:center;padding:14px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;position:sticky;top:0;z-index:10;}
.step-item{display:flex;align-items:center;gap:6px;font-size:clamp(.75em,2vw,.88em);color:#94a3b8;white-space:nowrap;padding:4px 6px;}
.step-item a{color:inherit;text-decoration:none;}
.step-item a:hover{color:var(--primary);}
.step-item.active{color:var(--primary);font-weight:700;}
.step-circle{width:22px;height:22px;border-radius:50%;font-size:.76em;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-item.active .step-circle{background:var(--primary);color:#fff;box-shadow:0 0 0 3px var(--primary-light);}
.step-item:not(.active) .step-circle{background:#94a3b8;color:#fff;}
.step-arrow{color:#cbd5e1;font-size:1.1em;padding:0 2px;}
.instruction{background:var(--primary-light);border-left:4px solid var(--primary);border-radius:0 var(--radius) var(--radius) 0;padding:13px 16px;margin-bottom:20px;font-size:.95em;color:var(--primary);line-height:1.7;}
.ex-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
.ex-head{background:var(--primary);color:#fff;padding:10px 16px;font-size:.88em;font-weight:700;display:flex;align-items:center;gap:8px;}
.ex-num{background:rgba(255,255,255,.25);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.8em;flex-shrink:0;}
.ex-body{padding:16px 18px 8px;}
.q-text{font-size:clamp(1em,3vw,1.25em);font-weight:700;margin-bottom:14px;line-height:2.2;}
.step-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:9px;margin-bottom:8px;font-size:.9em;font-weight:700;line-height:2.5;animation:fadeIn .3s ease;}
.step-row.y{background:var(--warn-light);border:1.5px solid var(--warn);}
.step-row.b{background:var(--primary-light);border:1.5px solid var(--primary);}
.step-row.g{background:var(--success-light);border:1.5px solid var(--success);}
.slbl{font-size:.7em;font-weight:700;border-radius:6px;padding:2px 8px;white-space:nowrap;flex-shrink:0;}
.slbl.y{background:var(--warn);color:#fff;}
.slbl.b{background:var(--primary);color:#fff;}
.slbl.g{background:var(--success);color:#fff;}
.ans-box{background:var(--primary-light);border:2px solid var(--primary);border-radius:10px;padding:12px 16px;margin-bottom:8px;font-size:1.1em;font-weight:700;color:var(--primary);text-align:center;line-height:2.5;animation:fadeIn .3s ease;}
.next-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:12px;font-family:'BIZ UDPGothic',sans-serif;font-size:.95em;font-weight:700;cursor:pointer;margin-bottom:12px;transition:background .15s;}
.next-btn:hover{background:#1648cc;}
.done-badge{text-align:center;padding:8px;font-size:.85em;font-weight:700;color:var(--success);margin-bottom:12px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.nav-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;margin-top:28px;}
.btn-nav{font-family:'BIZ UDPGothic','BIZ UDP Gothic',sans-serif;font-size:.95em;font-weight:700;padding:12px 28px;border-radius:50px;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .15s,box-shadow .15s;}
.btn-nav:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.btn-back{background:#f1f5f9;color:var(--text-sub);}
.btn-forward{background:var(--primary);color:#fff;}
.btn-home{background:#e0e7ff;color:#3730a3;font-size:.85em;padding:10px 20px;}
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 4px;line-height:1.1;}
.frac .fn{border-bottom:2px solid currentColor;padding:0 5px 2px;text-align:center;min-width:1.2em;}
.frac .fd{padding:2px 5px 0;text-align:center;min-width:1.2em;}
</style>
</head>
<body>
<div class="page-header">
  <div class="unit-code">MC05</div>
  <h1>単項式の乗除　【例題】</h1>
</div>
<nav class="step-nav">
  <div class="step-item"><span class="step-circle">①</span><a href="intro.html">導入</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item active"><span class="step-circle">②</span><span>例題</span></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">③</span><a href="drill.html">演習</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">④</span><a href="check.html">確認</a></div>
</nav>
<main class="g-container">
  <div class="instruction">
    <strong>【例題】</strong>　ボタンをタップして、考え方 → 答えの順に確認しよう！
  </div>
  <div style="background:linear-gradient(135deg,#fef3c7,#fffbeb);border:2px solid var(--warn);border-radius:12px;padding:10px 14px;margin-bottom:16px;font-size:.88em;font-weight:700;text-align:center;color:var(--warn);">
    💡 係数は係数同士・文字は文字同士　　÷ はわるは下（分母に）
  </div>
  <div id="examples-area"></div>
  <div class="nav-btns">
    <a href="../index.html" class="btn-nav btn-home">🏠 単元一覧へ</a>
    <a href="intro.html" class="btn-nav btn-back">← 導入にもどる</a>
    <a href="drill.html" class="btn-nav btn-forward">③ 演習へ →</a>
  </div>
</main>
<script>
function F(n,d){
  return '<span class="frac"><span class="fn">'+n+'</span><span class="fd">'+d+'</span></span>';
}

const EXAMPLES = [
  {
    title: '単項式×単項式（基本）',
    q: '5a × 3b を計算しなさい',
    steps: [
      { cls:'y', lbl:'考え方', txt:'係数と文字を分けて計算する' },
      { cls:'b', lbl:'係数',   txt:'5 × 3 ＝ 15' },
      { cls:'b', lbl:'文字',   txt:'a × b ＝ ab' },
    ],
    ans: '15ab'
  },
  {
    title: '符号ありの乗算',
    q: '(－3x) × 4y を計算しなさい',
    steps: [
      { cls:'y', lbl:'符号', txt:'－ × ＋ ＝ <strong style="color:var(--accent);">－</strong>' },
      { cls:'b', lbl:'係数', txt:'3 × 4 ＝ 12' },
      { cls:'b', lbl:'文字', txt:'x × y ＝ xy' },
    ],
    ans: '－12xy'
  },
  {
    title: '単項式÷単項式（縦形分数）',
    q: '18a²b ÷ 3a を計算しなさい',
    steps: [
      { cls:'y', lbl:'考え方', txt:'÷ は分母に。わる数(3a)を分母に置く（わるは下）' },
      { cls:'b', lbl:'分数に', txt:'18a²b ÷ 3a ＝ ' + F('18a²b','3a') },
      { cls:'b', lbl:'係数',   txt:'18 ÷ 3 ＝ 6' },
      { cls:'g', lbl:'文字',   txt:'a²b ÷ a ＝ ab　→　答え 6ab' },
    ],
    ans: '6ab'
  },
  {
    title: '乗除混合（÷と×が混じる）',
    q: '9x²y ÷ 3xy × 2x を計算しなさい',
    steps: [
      { cls:'y', lbl:'考え方', txt:'÷の後→分母　×の後→分子　にまとめる' },
      { cls:'b', lbl:'整理',   txt: F('9x²y × 2x','3xy') + ' ＝ ' + F('18x³y','3xy') },
      { cls:'b', lbl:'係数',   txt:'18 ÷ 3 ＝ 6' },
      { cls:'g', lbl:'文字',   txt:'x³y ÷ xy ＝ x²　→　答え 6x²' },
    ],
    ans: '6x²'
  },
  {
    title: '累乗（符号に注意！）',
    q: '(－5x)² を計算しなさい',
    steps: [
      { cls:'y', lbl:'展開', txt:'²は同じものを2回掛ける：(－5x) × (－5x)' },
      { cls:'b', lbl:'符号', txt:'－ × － ＝ <strong style="color:var(--primary);">＋</strong>（マイナス×マイナス＝プラス）' },
      { cls:'b', lbl:'係数', txt:'5 × 5 ＝ 25' },
      { cls:'g', lbl:'文字', txt:'x × x ＝ x²　→　答え 25x²' },
    ],
    ans: '25x²'
  },
];

const state = EXAMPLES.map(() => 0);

function buildAll() {
  const area = document.getElementById('examples-area');
  EXAMPLES.forEach((ex, i) => {
    const div = document.createElement('div');
    div.className = 'ex-card';
    div.id = 'excard' + i;
    div.innerHTML =
      '<div class="ex-head"><span class="ex-num">' + (i+1) + '</span>' + ex.title + '</div>' +
      '<div class="ex-body">' +
        '<div class="q-text">' + ex.q + '</div>' +
        '<div id="steps' + i + '"></div>' +
        '<button class="next-btn" id="btn' + i + '" onclick="nextStep(' + i + ')">💡 考え方を見る</button>' +
        '<div id="done' + i + '" class="done-badge" style="display:none;">✅ 完了！</div>' +
      '</div>';
    area.appendChild(div);
  });
}

function nextStep(i) {
  const ex      = EXAMPLES[i];
  const cur     = state[i];
  const stepsDiv = document.getElementById('steps' + i);
  const btn      = document.getElementById('btn'   + i);
  const doneDiv  = document.getElementById('done'  + i);
  if (cur < ex.steps.length) {
    const s = ex.steps[cur];
    const row = document.createElement('div');
    row.className = 'step-row ' + s.cls;
    row.innerHTML = '<span class="slbl ' + s.cls + '">' + s.lbl + '</span>' + s.txt;
    stepsDiv.appendChild(row);
    state[i]++;
    btn.textContent = state[i] < ex.steps.length ? '➡ 次のステップへ' : '✅ 答えを見る';
  } else {
    const ansBox = document.createElement('div');
    ansBox.className = 'ans-box';
    ansBox.innerHTML = '答え：<strong>' + ex.ans + '</strong>';
    stepsDiv.appendChild(ansBox);
    btn.style.display = 'none';
    doneDiv.style.display = 'block';
  }
}

buildAll();
</script>
<script src="../gamba_support.js"></script>
</body>
</html>
