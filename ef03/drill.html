<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EF03 和と差の積 【演習】</title>
<style>
:root{--primary:#0369a1;--primary-light:#e0f2fe;--accent:#e8372d;--accent-light:#fff1f0;--success:#16a34a;--success-light:#dcfce7;--warn:#d97706;--warn-light:#fffbeb;--bg:#f0f9ff;--card:#ffffff;--border:#bae6fd;--text:#1e293b;--text-sub:#64748b;--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','BIZ UDP Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
.g-container{max-width:760px;margin:0 auto;padding:22px 15px 60px;}
.page-header{background:var(--primary);color:#fff;padding:16px 20px 12px;text-align:center;box-shadow:0 3px 10px rgba(3,105,161,.25);}
.page-header .unit-code{font-size:.8em;opacity:.8;letter-spacing:.1em;margin-bottom:3px;}
.page-header h1{font-size:clamp(.98em,3vw,1.38em);font-weight:700;margin:0;line-height:1.4;}
.step-nav{display:flex;align-items:center;justify-content:center;padding:9px 6px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;position:sticky;top:0;z-index:10;gap:1px;}
.step-item{display:flex;align-items:center;gap:3px;font-size:clamp(.62em,1.6vw,.78em);color:#94a3b8;white-space:nowrap;padding:2px 4px;}
.step-item a{color:inherit;text-decoration:none;}
.step-item.active{color:var(--primary);font-weight:700;}
.step-circle{width:19px;height:19px;border-radius:50%;font-size:.68em;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-item.active .step-circle{background:var(--primary);color:#fff;}
.step-item:not(.active) .step-circle{background:#94a3b8;color:#fff;}
.step-arrow{color:#cbd5e1;font-size:.9em;padding:0;}
.instruction{background:var(--primary-light);border-left:4px solid var(--primary);border-radius:0 var(--radius) var(--radius) 0;padding:12px 15px;margin-bottom:18px;font-size:.93em;color:var(--primary);line-height:1.7;}
.tip2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.tip2 div{border-radius:8px;padding:8px;font-size:.84em;font-weight:700;text-align:center;line-height:1.5;}
.nav-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;margin-top:26px;}
.btn-nav{font-family:'BIZ UDPGothic','BIZ UDP Gothic',sans-serif;font-size:.93em;font-weight:700;padding:11px 24px;border-radius:50px;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .15s,box-shadow .15s;}
.btn-nav:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.btn-f{background:var(--primary);color:#fff;}
.btn-b{background:#f1f5f9;color:var(--text-sub);}
.btn-h{background:#e0e7ff;color:#3730a3;font-size:.83em;padding:9px 18px;}
.problem-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.problem-head{display:flex;align-items:center;padding:13px 15px;gap:11px;flex-wrap:wrap;font-weight:700;font-size:.97em;}
.prob-badge{font-size:.72em;font-weight:700;border-radius:6px;padding:3px 9px;white-space:nowrap;flex-shrink:0;}
.prob-badge.green{background:#15803d;color:#fff;}
.prob-badge.orange{background:#ea580c;color:#fff;}
.prob-badge.blue{background:var(--primary);color:#fff;}
.ans-toggle{margin-left:auto;background:none;border:1.5px solid #94a3b8;border-radius:20px;padding:5px 13px;font-family:'BIZ UDPGothic',sans-serif;font-size:.78em;color:var(--text-sub);cursor:pointer;white-space:nowrap;}
.ans-area{display:none;padding:0 13px 12px;}
.ans-result{background:var(--primary-light);border:2px solid var(--primary);border-radius:8px;padding:7px 11px;margin-bottom:7px;font-weight:700;color:var(--primary);}
.calc-row{display:flex;align-items:flex-start;gap:6px;padding:8px 11px;border-radius:8px;margin-bottom:5px;font-size:.86em;font-weight:700;line-height:2.1;}
.calc-row.y{background:var(--warn-light);border:1.5px solid var(--warn);}
.calc-row.b{background:var(--primary-light);border:1.5px solid var(--primary);}
.clbl{font-size:.68em;font-weight:700;border-radius:5px;padding:2px 7px;white-space:nowrap;flex-shrink:0;margin-top:3px;}
.clbl.y{background:var(--warn);color:#fff;}
.clbl.b{background:var(--primary);color:#fff;}
</style>
</head>
<body>
<div class="page-header">
  <div class="unit-code">EF03</div>
  <h1>和と差の積<br><small style="font-size:.75em;opacity:.85;">演習</small></h1>
</div>
<nav class="step-nav">
  <div class="step-item"><span class="step-circle">①</span><a href="../ef01/intro.html">展開の基本</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">②</span><a href="../ef02/intro.html">平方公式</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item active"><span class="step-circle">③</span><span>和と差の積</span></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">③</span><a href="../ef03/intro.html">和と差の積</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">④</span><a href="../ef04/intro.html">因数分解①</a></div>
</nav>
<nav class="step-nav" style="border-top:1px solid var(--border);">
  <div class="step-item"><span class="step-circle">①</span><a href="intro.html">導入</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">②</span><a href="example.html">例題</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item active"><span class="step-circle">③</span><span>演習</span></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">④</span><a href="check.html">確認</a></div>
</nav>
<main class="g-container">
<div class="instruction"><strong>【演習】</strong>　自分で考えてから「答を見る」で確認しよう</div>
<div style="background:#e0f2fe;border:1.5px solid #0369a1;border-radius:9px;padding:10px 14px;margin-bottom:16px;font-size:.93em;font-weight:700;color:#0369a1;text-align:center;">(χ＋a)(χ－a)＝χ²－a²　← 真ん中の項が消える！</div>
<div id="drill-area"></div>
<div class="nav-btns">
  <a href="../ef_index.html" class="btn-nav btn-h">🏠 単元一覧へ</a>
  <a href="example.html" class="btn-nav btn-b">← 例題</a>
  <a href="check.html" class="btn-nav btn-f">④ 確認テストへ →</a>
</div>
</main>
<script>
const SETS=[
  {set_id:1,problems:[
    {badge:"blue",badge_lbl:"公式③",q:"(χ＋6)(χ－6)",ans:"χ²－36",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝χ，後＝6　→「和と差の積」の形！"},
        {cls:"y",lbl:"確認②",txt:"後² ＝ 6² ＝ <strong style='color:var(--accent);'>36</strong>"},
        {cls:"b",lbl:"公式③",txt:"χ² － 36"},
      ]},
    {badge:"blue",badge_lbl:"公式③",q:"(χ＋10)(χ－10)",ans:"χ²－100",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝χ，後＝10　→「和と差の積」の形！"},
        {cls:"y",lbl:"確認②",txt:"後² ＝ 10² ＝ <strong style='color:var(--accent);'>100</strong>"},
        {cls:"b",lbl:"公式③",txt:"χ² － 100"},
      ]},
    {badge:"blue",badge_lbl:"公式③応用",q:"(2χ＋1)(2χ－1)",ans:"4χ²－1",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝ <strong style='color:var(--accent);'>2χ</strong>，後＝ <strong style='color:var(--accent);'>1</strong>　→「和と差の積」の形！"},
        {cls:"y",lbl:"確認②",txt:"前² ＝ (2χ)² ＝ <strong style='color:var(--accent);'>4χ²</strong>　　後² ＝ 1"},
        {cls:"b",lbl:"公式③",txt:"4χ² － 1"},
      ]},
    {badge:"blue",badge_lbl:"公式③応用",q:"(3χ＋4)(3χ－4)",ans:"9χ²－16",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝ <strong style='color:var(--accent);'>3χ</strong>，後＝ <strong style='color:var(--accent);'>4</strong>"},
        {cls:"y",lbl:"確認②",txt:"前² ＝ (3χ)² ＝ <strong style='color:var(--accent);'>9χ²</strong>　　後² ＝ 4² ＝ <strong style='color:var(--accent);'>16</strong>"},
        {cls:"b",lbl:"公式③",txt:"9χ² － 16"},
      ]},
  ]},
  {set_id:2,problems:[
    {badge:"blue",badge_lbl:"公式③",q:"(χ＋8)(χ－8)",ans:"χ²－64",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝χ，後＝8　→「和と差の積」の形！"},
        {cls:"y",lbl:"確認②",txt:"後² ＝ 8² ＝ <strong style='color:var(--accent);'>64</strong>"},
        {cls:"b",lbl:"公式③",txt:"χ² － 64"},
      ]},
    {badge:"blue",badge_lbl:"公式③",q:"(a＋5)(a－5)",ans:"a²－25",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝a，後＝5　→「和と差の積」の形！"},
        {cls:"y",lbl:"確認②",txt:"後² ＝ 5² ＝ <strong style='color:var(--accent);'>25</strong>"},
        {cls:"b",lbl:"公式③",txt:"a² － 25"},
      ]},
    {badge:"blue",badge_lbl:"公式③応用",q:"(5χ＋2)(5χ－2)",ans:"25χ²－4",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝ <strong style='color:var(--accent);'>5χ</strong>，後＝ <strong style='color:var(--accent);'>2</strong>"},
        {cls:"y",lbl:"確認②",txt:"前² ＝ (5χ)² ＝ <strong style='color:var(--accent);'>25χ²</strong>　　後² ＝ 2² ＝ <strong style='color:var(--accent);'>4</strong>"},
        {cls:"b",lbl:"公式③",txt:"25χ² － 4"},
      ]},
    {badge:"blue",badge_lbl:"公式③応用",q:"(χ＋3y)(χ－3y)",ans:"χ²－9y²",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝ <strong style='color:var(--accent);'>χ</strong>，後＝ <strong style='color:var(--accent);'>3y</strong>"},
        {cls:"y",lbl:"確認②",txt:"後² ＝ (3y)² ＝ <strong style='color:var(--accent);'>9y²</strong>"},
        {cls:"b",lbl:"公式③",txt:"χ² － 9y²"},
      ]},
  ]},
  {set_id:3,problems:[
    {badge:"blue",badge_lbl:"公式③",q:"(χ＋7)(χ－7)",ans:"χ²－49",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝χ，後＝7　→「和と差の積」の形！"},
        {cls:"y",lbl:"確認②",txt:"後² ＝ 7² ＝ <strong style='color:var(--accent);'>49</strong>"},
        {cls:"b",lbl:"公式③",txt:"χ² － 49"},
      ]},
    {badge:"blue",badge_lbl:"公式③応用",q:"(4χ＋3)(4χ－3)",ans:"16χ²－9",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝ <strong style='color:var(--accent);'>4χ</strong>，後＝ <strong style='color:var(--accent);'>3</strong>"},
        {cls:"y",lbl:"確認②",txt:"前² ＝ (4χ)² ＝ <strong style='color:var(--accent);'>16χ²</strong>　　後² ＝ 3² ＝ <strong style='color:var(--accent);'>9</strong>"},
        {cls:"b",lbl:"公式③",txt:"16χ² － 9"},
      ]},
    {badge:"blue",badge_lbl:"公式③応用",q:"(2χ＋5y)(2χ－5y)",ans:"4χ²－25y²",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝ <strong style='color:var(--accent);'>2χ</strong>，後＝ <strong style='color:var(--accent);'>5y</strong>"},
        {cls:"y",lbl:"確認②",txt:"前² ＝ (2χ)² ＝ <strong style='color:var(--accent);'>4χ²</strong>　　後² ＝ (5y)² ＝ <strong style='color:var(--accent);'>25y²</strong>"},
        {cls:"b",lbl:"公式③",txt:"4χ² － 25y²"},
      ]},
    {badge:"blue",badge_lbl:"公式③",q:"(b＋9)(b－9)",ans:"b²－81",
      steps:[
        {cls:"y",lbl:"確認①",txt:"前＝b，後＝9　→「和と差の積」の形！"},
        {cls:"y",lbl:"確認②",txt:"後² ＝ 9² ＝ <strong style='color:var(--accent);'>81</strong>"},
        {cls:"b",lbl:"公式③",txt:"b² － 81"},
      ]},
  ]},
];
const si=Math.floor(Math.random()*SETS.length);
const probs=SETS[si].problems;
function build(){
  const area=document.getElementById('drill-area');area.innerHTML='';
  probs.forEach((p,i)=>{
    area.innerHTML+=`<div class="problem-card" id="dc${i}"><div class="problem-head"><span class="prob-badge ${p.badge}">${p.badge_lbl}</span>${p.q}<button class="ans-toggle" onclick="tog(${i})">答を見る</button></div><div class="ans-area" id="de${i}"></div></div>`;
  });
}
function tog(i){
  const p=probs[i];const d=document.getElementById('de'+i);const btn=document.querySelector('#dc'+i+' .ans-toggle');
  if(d.style.display==='block'){d.style.display='none';btn.textContent='答を見る';return;}
  let h=`<div class="ans-result">正解：<strong>${p.ans}</strong></div>`;
  p.steps.forEach(s=>{h+=`<div class="calc-row ${s.cls}"><span class="clbl ${s.cls}">${s.lbl}</span><div>${s.txt}</div></div>`;});
  d.innerHTML=h;d.style.display='block';btn.textContent='答を隠す';
}
build();
</script>
</body>
</html>
