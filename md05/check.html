<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD05 かっこをはずす方程式 【確認テスト】</title>
<style>
:root{--primary:#1a56a0;--primary-light:#dbeafe;--accent:#e8372d;--accent-light:#fff1f0;--success:#16a34a;--success-light:#dcfce7;--warn:#d97706;--warn-light:#fffbeb;--bg:#f0f6ff;--card:#ffffff;--border:#c7d9f5;--text:#1e293b;--text-sub:#64748b;--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','BIZ UDP Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
.g-container{max-width:760px;margin:0 auto;padding:24px 16px 60px;}
.page-header{background:var(--primary);color:#fff;padding:18px 24px 14px;text-align:center;box-shadow:0 3px 10px rgba(26,86,160,.25);}
.page-header .unit-code{font-size:.82em;opacity:.8;letter-spacing:.1em;margin-bottom:4px;}
.page-header h1{font-size:clamp(1.1em,3vw,1.55em);font-weight:700;margin:0;}
.step-nav{display:flex;align-items:center;justify-content:center;padding:14px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;position:sticky;top:0;z-index:10;}
.step-item{display:flex;align-items:center;gap:6px;font-size:clamp(.75em,2vw,.88em);color:#94a3b8;white-space:nowrap;padding:4px 6px;}
.step-item a{color:inherit;text-decoration:none;}
.step-item a:hover{color:var(--primary);}
.step-item.active{color:var(--primary);font-weight:700;}
.step-circle{width:22px;height:22px;border-radius:50%;font-size:.76em;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-item.active .step-circle{background:var(--primary);color:#fff;box-shadow:0 0 0 3px var(--primary-light);}
.step-item:not(.active) .step-circle{background:#94a3b8;color:#fff;}
.step-arrow{color:#cbd5e1;font-size:1.1em;padding:0 2px;}
.section-title{font-size:1.05em;font-weight:700;color:var(--primary);border-left:4px solid var(--primary);padding-left:12px;margin-bottom:16px;margin-top:28px;}
.section-title:first-of-type{margin-top:0;}
.summary-box{background:var(--warn-light);border:2px solid var(--warn);border-radius:var(--radius);padding:18px 20px;margin-bottom:28px;font-size:.97em;line-height:2;}
.summary-box .summary-title{font-weight:700;color:var(--warn);font-size:1.05em;margin-bottom:8px;}
.summary-box ul{margin:0;padding-left:20px;}
.summary-box li{margin-bottom:4px;}
.summary-box strong{color:var(--primary);}
.nav-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;margin-top:28px;}
.btn-nav{font-family:'BIZ UDPGothic','BIZ UDP Gothic',sans-serif;font-size:.95em;font-weight:700;padding:12px 28px;border-radius:50px;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .15s,box-shadow .15s;}
.btn-nav:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.btn-forward{background:var(--primary);color:#fff;}
.btn-back{background:#f1f5f9;color:var(--text-sub);}
.btn-success{background:var(--success);color:#fff;}
.btn-home{background:#e0e7ff;color:#3730a3;font-size:.85em;padding:10px 20px;}
.ex-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;}
.ex-card-head{background:var(--primary);color:#fff;padding:8px 16px;font-size:.85em;font-weight:700;}
.ex-card-body{padding:14px 18px;}
.step-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:9px;margin-bottom:8px;font-size:.9em;font-weight:700;line-height:2.5;}
.step-row.y{background:var(--warn-light);border:1.5px solid var(--warn);}
.step-row.b{background:var(--primary-light);border:1.5px solid var(--primary);}
.step-row.g{background:var(--success-light);border:1.5px solid var(--success);}
.slbl{font-size:.7em;font-weight:700;border-radius:6px;padding:2px 8px;white-space:nowrap;flex-shrink:0;}
.slbl.y{background:var(--warn);color:#fff;}
.slbl.b{background:var(--primary);color:#fff;}
.slbl.g{background:var(--success);color:#fff;}
.ans-box{background:var(--primary-light);border:2px solid var(--primary);border-radius:10px;padding:12px 16px;margin-top:10px;font-size:1.15em;font-weight:700;color:var(--primary);text-align:center;line-height:2.5;}
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 4px;line-height:1.1;}
.frac .fn{border-bottom:2px solid currentColor;padding:0 5px 2px;text-align:center;min-width:1.2em;}
.frac .fd{padding:2px 5px 0;text-align:center;min-width:1.2em;}

.instruction{background:var(--primary-light);border-left:4px solid var(--primary);border-radius:0 var(--radius) var(--radius) 0;padding:13px 16px;margin-bottom:20px;font-size:.95em;color:var(--primary);line-height:1.7;}
.problem-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.problem-head{display:flex;align-items:center;padding:16px 18px;gap:10px;flex-wrap:wrap;}
.ans-toggle{margin-left:auto;background:none;border:1.5px solid #94a3b8;border-radius:20px;padding:5px 14px;font-family:'BIZ UDPGothic',sans-serif;font-size:.8em;color:var(--text-sub);cursor:pointer;white-space:nowrap;}
.expr{font-size:clamp(1em,3vw,1.2em);font-weight:700;line-height:2.2;}
.calc-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:7px 10px;border-radius:8px;margin-bottom:5px;font-size:.88em;font-weight:700;line-height:2.2;}
.calc-row.y{background:var(--warn-light);border:1.5px solid var(--warn);}
.calc-row.g{background:var(--success-light);border:1.5px solid var(--success);}
.clbl{font-size:.7em;font-weight:700;border-radius:6px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.clbl.y{background:var(--warn);color:#fff;}
.clbl.g{background:var(--success);color:#fff;}
.problem-card{margin-bottom:14px;}
.p-num{display:inline-block;background:var(--primary);color:#fff;border-radius:6px;padding:2px 9px;font-size:.78em;font-weight:700;margin-bottom:8px;}
.q-text{font-size:clamp(1em,3vw,1.2em);font-weight:700;margin-bottom:12px;line-height:2.2;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 18px 14px;}
.choice-btn{font-family:'BIZ UDPGothic','BIZ UDP Gothic',sans-serif;background:var(--bg);border:2.5px solid var(--border);border-radius:10px;padding:14px 8px;font-size:.92em;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;text-align:center;line-height:2;}
.choice-btn:hover:not(:disabled){background:var(--primary-light);border-color:var(--primary);color:var(--primary);}
.choice-btn.selected{background:var(--primary-light);border-color:var(--primary);color:var(--primary);}
.choice-btn.correct{background:var(--success-light);border-color:var(--success);color:var(--success);}
.choice-btn.wrong{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.choice-btn:disabled{cursor:default;}
.expl-area{display:none;padding:0 14px 14px;}
.score-box{display:none;background:var(--card);border:3px solid var(--primary);border-radius:var(--radius);padding:20px 24px;text-align:center;}
.score-box.visible{display:block;}
.score-label{font-size:.9em;color:var(--text-sub);margin-bottom:6px;}
.score-num{font-size:clamp(1.8em,5vw,2.6em);font-weight:700;color:var(--primary);}
.score-msg{margin-top:8px;font-size:.9em;color:var(--text-sub);}
.btn-submit{font-family:'BIZ UDPGothic','BIZ UDP Gothic',sans-serif;background:var(--primary);color:#fff;font-size:clamp(1em,3vw,1.15em);font-weight:700;padding:14px clamp(36px,10vw,80px);border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 14px rgba(26,86,160,.3);transition:transform .15s;letter-spacing:.05em;}
.confetti-piece{position:fixed;top:-20px;border-radius:3px;opacity:0;animation:confettiFall linear forwards;pointer-events:none;z-index:9999;}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}80%{opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="page-header">
  <div class="unit-code">MD05</div>
  <h1>かっこをはずす方程式　【確認テスト】</h1>
</div>
<nav class="step-nav"><div class="step-item"><span class="step-circle">①</span><a href="intro.html">導入</a></div><span class="step-arrow">›</span><div class="step-item"><span class="step-circle">②</span><a href="example.html">例題</a></div><span class="step-arrow">›</span><div class="step-item"><span class="step-circle">③</span><a href="drill.html">演習</a></div><span class="step-arrow">›</span><div class="step-item active"><span class="step-circle">④</span><span>確認</span></div></nav>
<main class="g-container">

  <div class="instruction" style="border-left-color:var(--accent);"><strong>【確認テスト】</strong>　全問正解で合格！正しい答えをひとつ選ぼう。</div>
  <div style="background:linear-gradient(135deg,#fef3c7,#fffbeb);border:2px solid var(--warn);border-radius:12px;padding:10px 14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <div style="background:var(--primary-light);border-radius:8px;padding:7px;color:var(--primary);font-size:.88em;font-weight:700;text-align:center;">かっこをはずしてから解く</div>
    <div style="background:var(--accent-light);border-radius:8px;padding:7px;color:var(--accent);font-size:.88em;font-weight:700;text-align:center;">符号のミスに注意！</div>
  </div>
  <div id="problems-area"></div>
  <div style="text-align:center;margin-top:28px;">
    <button onclick="judgeAll()" class="btn-submit">判定する</button>
  </div>
  <div id="result-area" class="score-box" style="margin-top:24px;"></div>
  <div class="nav-btns">
    <a href="../../index.html" class="btn-nav btn-home">🏠 単元一覧へ</a>
    <a href="drill.html" class="btn-nav btn-back">← 演習にもどる</a>
    <a id="btn-next" href="../../index.html" class="btn-nav btn-success" style="display:none;">単元一覧へ →</a>
  </div>
</main>
<script>
const _CHECK=[
  {set_id:1,problems:[
    {id:'Q1',q:'6χ－(χ－3)＝7 を解きなさい',choices:['<span class="frac"><span class="fn">4</span><span class="fd">5</span></span>','χ＝2','<span class="frac"><span class="fn">4</span><span class="fd">3</span></span>','χ＝1'],ans:0,hint:'6χ－χ＋3＝7　→　5χ＝4　→　χ＝<span class="frac"><span class="fn">4</span><span class="fd">5</span></span>'},
    {id:'Q2',q:'4χ－2(χ－1)＝7 を解きなさい',choices:['<span class="frac"><span class="fn">5</span><span class="fd">2</span></span>','χ＝3','χ＝4','<span class="frac"><span class="fn">7</span><span class="fd">2</span></span>'],ans:0,hint:'2χ＋2＝7　→　2χ＝5　→　χ＝<span class="frac"><span class="fn">5</span><span class="fd">2</span></span>'},
    {id:'Q3',q:'2(χ－1)＝χ＋9 を解きなさい',choices:['χ＝11','χ＝7','χ＝－11','χ＝－7'],ans:0,hint:'2χ－2＝χ＋9　→　χ＝11'},
    {id:'Q4',q:'5(2χ＋1)＝7χ－1 を解きなさい',choices:['χ＝－2','χ＝2','χ＝－<span class="frac"><span class="fn">2</span><span class="fd">3</span></span>','χ＝<span class="frac"><span class="fn">2</span><span class="fd">3</span></span>'],ans:0,hint:'10χ＋5＝7χ－1　→　3χ＝－6　→　χ＝－2'},
  ]},
  {set_id:2,problems:[
    {id:'Q1',q:'3χ－(5χ－1)＝8 を解きなさい',choices:['χ＝－<span class="frac"><span class="fn">7</span><span class="fd">2</span></span>','χ＝<span class="frac"><span class="fn">7</span><span class="fd">2</span></span>','χ＝－<span class="frac"><span class="fn">7</span><span class="fd">4</span></span>','χ＝<span class="frac"><span class="fn">7</span><span class="fd">4</span></span>'],ans:0,hint:'3χ－5χ＋1＝8　→　－2χ＝7　→　χ＝－<span class="frac"><span class="fn">7</span><span class="fd">2</span></span>'},
    {id:'Q2',q:'9－χ＝－5(3－χ) を解きなさい',choices:['χ＝4','χ＝－4','χ＝6','χ＝－6'],ans:0,hint:'9－χ＝－15＋5χ　→　－6χ＝－24　→　χ＝4'},
    {id:'Q3',q:'4χ＋3(χ－1)＝11 を解きなさい',choices:['χ＝1','χ＝2','χ＝3','χ＝4'],ans:1,hint:'7χ－3＝11　→　7χ＝14　→　χ＝2'},
    {id:'Q4',q:'5χ－3(χ－1)＝7 を解きなさい',choices:['χ＝1','χ＝2','χ＝3','χ＝4'],ans:1,hint:'2χ＋3＝7　→　2χ＝4　→　χ＝2'},
  ]},
];
const setIndex=Math.floor(Math.random()*_CHECK.length);
const problems=_CHECK[setIndex].problems;
let startTime=Date.now();
const state=[];
function buildProblems(){
  const area=document.getElementById('problems-area');
  area.innerHTML='';
  problems.forEach((p,i)=>{
    const idx=p.choices.map((_,j)=>j);
    for(let j=idx.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[idx[j],idx[k]]=[idx[k],idx[j]];}
    const shuffled=idx.map(j=>p.choices[j]);
    const ci=idx.indexOf(p.ans);
    state[i]={chosenIdx:-1,correctIdx:ci,shuffled,p};
    const btns=shuffled.map((c,j)=>'<button class="choice-btn" onclick="selectChoice('+i+','+j+')">'+c+'</button>').join('');
    area.innerHTML+='<div class="problem-card" id="card'+i+'">'
      +'<div style="padding:16px 18px 10px;">'
      +'<div class="p-num">問 '+(i+1)+'</div>'
      +'<div class="q-text">'+p.q+'</div></div>'
      +'<div class="choices">'+btns+'</div>'
      +'<div class="expl-area" id="expl'+i+'"></div></div>';
  });
}
function selectChoice(qi,ci){
  if(state[qi].locked)return;
  state[qi].chosenIdx=ci;
  document.getElementById('card'+qi).querySelectorAll('.choice-btn')
    .forEach((b,bi)=>b.classList.toggle('selected',bi===ci));
}
function judgeAll(){
  let correct=0;
  problems.forEach((p,i)=>{
    const s=state[i];
    document.getElementById('card'+i).querySelectorAll('.choice-btn').forEach((b,bi)=>{
      b.disabled=true;b.classList.remove('selected');
      if(bi===s.correctIdx)b.classList.add('correct');
      else if(bi===s.chosenIdx&&s.chosenIdx!==s.correctIdx)b.classList.add('wrong');
    });
    const isOk=s.chosenIdx===s.correctIdx;
    if(isOk)correct++;
    const ans=s.shuffled[s.correctIdx];
    const expl=document.getElementById('expl'+i);
    let html=isOk
      ?'<div style="background:var(--success-light);border:2px solid var(--success);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-weight:700;color:var(--success);">⭕ 正解！　<strong>'+ans+'</strong></div>'
      :'<div style="background:var(--accent-light);border:2px solid var(--accent);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-weight:700;color:var(--accent);">❌ 正解は <strong style="font-size:1.1em;">'+ans+'</strong>'+(s.chosenIdx<0?'（未選択）':'')+'</div>';
    html+='<div class="calc-row y"><span class="clbl y">解説</span>'+p.hint+'</div>';
    html+='<div class="calc-row g"><span class="clbl g">答え</span><strong style="color:var(--primary)">'+ans+'</strong></div>';
    expl.innerHTML=html;expl.style.display='block';state[i].locked=true;
  });
  const isPassed=correct===problems.length;
  const ra=document.getElementById('result-area');ra.classList.add('visible');
  const msg=isPassed?'完璧！マスターです 🎉':correct>=problems.length*0.75?'あと少し！もう一度確認しよう。':'解説を見てルールを復習しよう！';
  ra.innerHTML='<div class="score-label">合計点</div><div class="score-num">'+correct+' / '+problems.length+' 正解</div><div class="score-msg">'+msg+'</div>'+(isPassed?'<div style="margin-top:12px;font-size:.95em;color:#16a34a;font-weight:700;">✅ 合格！</div>':'');
  if(isPassed){
    launchConfetti();
    document.getElementById('btn-next').style.display='inline-block';
    localStorage.setItem('gamba_prog_MD05','pass');
  }
  ra.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function launchConfetti(){
  const colors=['#e8372d','#1a56a0','#16a34a','#d97706','#7c3aed','#ec4899','#0ea5e9','#f59e0b'];
  for(let i=0;i<120;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      const sz=Math.random()*10+6;
      el.style.cssText='left:'+(Math.random()*100)+'vw;width:'+sz+'px;height:'+sz+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:50%;animation-duration:'+(Math.random()*2+2)+'s;animation-delay:0s';
      document.body.appendChild(el);setTimeout(()=>el.remove(),5000);
    },i*30);
  }
}
buildProblems();
</script>
<script src="../../gamba_support.js"></script>
</body>
</html>
