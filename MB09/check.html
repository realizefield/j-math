<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB09 指数の計算 【確認テスト】</title>
<style>
:root{--primary:#1a56a0;--primary-light:#dbeafe;--accent:#e8372d;--accent-light:#fff1f0;--success:#16a34a;--success-light:#dcfce7;--warn:#d97706;--warn-light:#fffbeb;--bg:#f0f6ff;--card:#ffffff;--border:#c7d9f5;--text:#1e293b;--text-sub:#64748b;--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','BIZ UDP Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
.g-container{max-width:760px;margin:0 auto;padding:24px 16px 60px;}
.page-header{background:var(--primary);color:#fff;padding:18px 24px 14px;text-align:center;}
.page-header .unit-code{font-size:.82em;opacity:.8;margin-bottom:4px;}
.page-header h1{font-size:clamp(1.1em,3vw,1.55em);font-weight:700;margin:0;}
.step-nav{display:flex;align-items:center;justify-content:center;padding:14px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;position:sticky;top:0;z-index:10;}
.step-item{display:flex;align-items:center;gap:6px;font-size:clamp(.75em,2vw,.88em);color:#94a3b8;white-space:nowrap;padding:4px 6px;}
.step-item a{color:inherit;text-decoration:none;}
.step-item.active{color:var(--primary);font-weight:700;}
.step-circle{width:22px;height:22px;border-radius:50%;font-size:.76em;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-item.active .step-circle{background:var(--primary);color:#fff;}
.step-item:not(.active) .step-circle{background:#94a3b8;color:#fff;}
.step-arrow{color:#cbd5e1;font-size:1.1em;padding:0 2px;}
.instruction{background:var(--primary-light);border-left:4px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;padding:13px 16px;margin-bottom:20px;font-size:.95em;color:var(--primary);line-height:1.7;}
.problem-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.problem-head{display:flex;align-items:center;padding:16px 18px;gap:10px;flex-wrap:wrap;}
.score-box{display:none;background:var(--card);border:3px solid var(--primary);border-radius:var(--radius);padding:20px 24px;text-align:center;}
.score-box.visible{display:block;}
.score-num{font-size:clamp(1.8em,5vw,2.6em);font-weight:700;color:var(--primary);}
.nav-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;margin-top:28px;}
.btn-nav{font-family:'BIZ UDPGothic','BIZ UDP Gothic',sans-serif;font-size:.95em;font-weight:700;padding:12px 28px;border-radius:50px;border:none;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-back{background:#f1f5f9;color:var(--text-sub);}
.btn-success{background:var(--success);color:#fff;}
.btn-home{background:#e0e7ff;color:#3730a3;font-size:.85em;padding:10px 20px;}
.btn-submit{font-family:'BIZ UDPGothic','BIZ UDP Gothic',sans-serif;background:var(--primary);color:#fff;font-size:clamp(1em,3vw,1.15em);font-weight:700;padding:14px clamp(36px,10vw,80px);border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 14px rgba(26,86,160,.3);}
.num-input{width:clamp(72px,16vw,96px);height:clamp(44px,9vw,54px);text-align:center;font-size:clamp(1em,3vw,1.3em);font-weight:700;font-family:'BIZ UDPGothic',sans-serif;border:2.5px solid var(--primary);border-radius:10px;background:#f0f6ff;color:var(--primary);outline:none;-moz-appearance:textfield;}
.num-input::-webkit-inner-spin-button,.num-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.num-input.correct{border-color:var(--success);background:var(--success-light);color:var(--success);}
.num-input.wrong{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.calc-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:7px 10px;border-radius:8px;margin-bottom:5px;font-size:.88em;font-weight:700;}
.calc-row.y{background:var(--warn-light);border:1.5px solid var(--warn);}
.calc-row.b{background:var(--primary-light);border:1.5px solid var(--primary);}
.calc-row.g{background:var(--success-light);border:1.5px solid var(--success);}
.clbl{font-size:.7em;font-weight:700;border-radius:6px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.clbl.y{background:var(--warn);color:#fff;}
.clbl.b{background:var(--primary);color:#fff;}
.clbl.g{background:var(--success);color:#fff;}
.expr{font-size:clamp(1.1em,3.5vw,1.5em);font-weight:700;}
sup{font-size:.65em;vertical-align:super;font-weight:700;}
.bracket-badge{display:inline-block;background:var(--primary-light);border:1.5px solid var(--primary);color:var(--primary);border-radius:6px;padding:2px 6px;font-size:.72em;font-weight:700;}
.plain-badge{display:inline-block;background:var(--accent-light);border:1.5px solid var(--accent);color:var(--accent);border-radius:6px;padding:2px 6px;font-size:.72em;font-weight:700;}
</style>
</head>
<body>
<div class="page-header">
  <div class="unit-code">MB09</div>
  <h1>指数の計算　【確認テスト】</h1>
</div>
<nav class="step-nav">
  <div class="step-item"><span class="step-circle">①</span><a href="intro.html">導入</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">②</span><a href="example.html">例題</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">③</span><a href="drill.html">演習</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item active"><span class="step-circle">④</span><span>確認</span></div>
</nav>
<main class="g-container">
  <div class="instruction" style="border-left-color:var(--accent);">
    <strong>【確認テスト】</strong>　カッコあり・なしに注意して全問正解を目指そう！
  </div>
  <div style="background:linear-gradient(135deg,#fef3c7,#fffbeb);border:2px solid var(--warn);border-radius:12px;padding:10px 14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.88em;font-weight:700;text-align:center;">
    <div style="background:var(--primary-light);border-radius:8px;padding:7px;color:var(--primary);">(−n)<sup>p</sup>：カッコごとかける</div>
    <div style="background:var(--accent-light);border-radius:8px;padding:7px;color:var(--accent);">−n<sup>p</sup>：数字だけ・最後に−</div>
  </div>
  <div id="problems-area"></div>
  <div style="text-align:center;margin-top:28px;">
    <button onclick="judgeAll()" class="btn-submit">判定する</button>
  </div>
  <div id="result-area" class="score-box" style="margin-top:24px;"></div>
  <div class="nav-btns" style="margin-top:20px;">
    <a href="../index.html" class="btn-nav btn-home">🏠 単元一覧へ</a>
    <a href="drill.html" class="btn-nav btn-back">← 演習にもどる</a>
    <a id="btn-next" href="../index.html" class="btn-nav btn-success" style="display:none;">単元一覧へ →</a>
  </div>
</main>
<script src="mb09_sets.js"></script>
<script>
const GAS_URL = 'https://script.google.com/macros/s/ここにURLを貼り付け/exec';
const setIndex = Math.floor(Math.random() * MB09_CHECK_SETS.length);
const problems = MB09_CHECK_SETS[setIndex].problems;
let startTime = Date.now();

function exprHTML(expr) {
  return expr.replace(/(\d+)([²³])/g, (m,n,e)=>`${n}<sup>${e==='²'?'2':'3'}</sup>`);
}

function buildProblems() {
  const area = document.getElementById('problems-area');
  area.innerHTML = '';
  problems.forEach((p, i) => {
    const badge = p.type==='bracket'
      ? '<span class="bracket-badge">カッコあり</span>'
      : '<span class="plain-badge">カッコなし</span>';
    area.innerHTML += `
      <div class="problem-card" id="card${i}">
        <div class="problem-head">
          <span class="expr">${exprHTML(p.expr)}</span>${badge}
          <span style="font-size:1.2em;font-weight:700;color:var(--text-sub);">＝</span>
          <input type="number" id="inp${i}" class="num-input" placeholder="?">
        </div>
        <div id="expl${i}" style="display:none;padding:0 14px 12px;"></div>
      </div>`;
  });
}

function judgeAll() {
  let correct = 0;
  const total = problems.length;
  problems.forEach((p, i) => {
    const inp  = document.getElementById('inp'+i);
    const expl = document.getElementById('expl'+i);
    const val  = parseInt(inp.value);
    const isOk = val === p.ans;
    const isNeg = p.ans < 0;
    const isBracket = p.type === 'bracket';
    inp.classList.remove('correct','wrong');
    inp.classList.add(isOk ? 'correct' : 'wrong');
    if (isOk) correct++;
    let html = isOk
      ? `<div style="background:var(--success-light);border:2px solid var(--success);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-weight:700;color:var(--success);">⭕ 正解！　<strong>${p.ans}</strong></div>`
      : `<div style="background:var(--accent-light);border:2px solid var(--accent);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-weight:700;color:var(--accent);">❌ 正解は <strong style="font-size:1.2em;">${p.ans}</strong></div>`;
    if (isBracket) {
      html += `
        <div class="calc-row y"><span class="clbl y">展開</span> ${exprHTML(p.expr)} ＝ カッコごと${p.exp}回かける</div>
        <div class="calc-row b"><span class="clbl b">符号</span> 負の数${p.exp}個（${p.exp%2===1?'奇数→−':'偶数→＋'}）</div>
        <div class="calc-row b"><span class="clbl b">計算</span> ${p.hint}</div>
        <div class="calc-row g"><span class="clbl g">答え</span> <strong style="color:${isNeg?'var(--accent)':'var(--primary)'};font-size:1.1em;">${p.ans}</strong></div>`;
    } else {
      html += `
        <div class="calc-row y"><span class="clbl y">展開</span> ${exprHTML(p.expr)} ＝ 数字だけかけて最後に−</div>
        <div class="calc-row b"><span class="clbl b">計算</span> ${p.hint}</div>
        <div class="calc-row g"><span class="clbl g">答え</span> <strong style="color:var(--accent);font-size:1.1em;">${p.ans}</strong></div>`;
    }
    expl.innerHTML = html;
    expl.style.display = 'block';
  });
  const isPassed = correct === total;
  const resultArea = document.getElementById('result-area');
  resultArea.classList.add('visible');
  const msg = isPassed
    ? '完璧！指数の計算マスターです 🎉'
    : correct >= total * 0.75 ? 'あと少し！カッコの有無に注意しよう。'
    : '解説を見て「カッコあり・なし」の違いを復習しよう！';
  resultArea.innerHTML = `
    <div style="font-size:.9em;color:var(--text-sub);margin-bottom:6px;">合計点</div>
    <div class="score-num">${correct} / ${total} 正解</div>
    <div style="margin-top:8px;font-size:.9em;color:var(--text-sub);">${msg}</div>
    ${isPassed ? '<div style="margin-top:12px;font-size:.95em;color:var(--success);font-weight:700;">✅ 合格！</div>' : ''}`;
  if (isPassed) {
    document.getElementById('btn-next').style.display = 'inline-block';
    localStorage.setItem('gamba_prog_MB09', 'pass');
    fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({student_id:localStorage.getItem('studentId')||'guest',
        student_name:localStorage.getItem('studentName')||'ゲスト',
        unit_code:'MB09',unit_name:'指数の計算',
        correct_count:correct,total_count:total,is_passed:true,
        study_minutes:Math.round((Date.now()-startTime)/60000)})
    }).catch(e=>console.log('GAS:',e));
  }
  resultArea.scrollIntoView({behavior:'smooth',block:'nearest'});
}
buildProblems();
</script>
<script src="../gamba_support.js"></script>
</body>
</html>
