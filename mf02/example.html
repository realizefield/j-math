<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF02 加減法② 【例題】</title>
<style>
:root{--primary:#1a56a0;--primary-light:#dbeafe;--accent:#e8372d;--accent-light:#fff1f0;--success:#16a34a;--success-light:#dcfce7;--warn:#d97706;--warn-light:#fffbeb;--bg:#f0f6ff;--card:#ffffff;--border:#c7d9f5;--text:#1e293b;--text-sub:#64748b;--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','BIZ UDP Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
.g-container{max-width:760px;margin:0 auto;padding:22px 15px 60px;}
.page-header{background:var(--primary);color:#fff;padding:16px 20px 12px;text-align:center;box-shadow:0 3px 10px rgba(26,86,160,.25);}
.page-header .unit-code{font-size:.8em;opacity:.8;letter-spacing:.1em;margin-bottom:3px;}
.page-header h1{font-size:clamp(.98em,3vw,1.38em);font-weight:700;margin:0;line-height:1.4;}
.step-nav{display:flex;align-items:center;justify-content:center;padding:9px 6px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;position:sticky;top:0;z-index:10;gap:1px;}
.step-item{display:flex;align-items:center;gap:3px;font-size:clamp(.62em,1.6vw,.78em);color:#94a3b8;white-space:nowrap;padding:2px 4px;}
.step-item a{color:inherit;text-decoration:none;}
.step-item a:hover{color:var(--primary);}
.step-item.active{color:var(--primary);font-weight:700;}
.step-circle{width:19px;height:19px;border-radius:50%;font-size:.68em;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-item.active .step-circle{background:var(--primary);color:#fff;box-shadow:0 0 0 2px var(--primary-light);}
.step-item:not(.active) .step-circle{background:#94a3b8;color:#fff;}
.step-arrow{color:#cbd5e1;font-size:.9em;padding:0;}
.instruction{background:var(--primary-light);border-left:4px solid var(--primary);border-radius:0 var(--radius) var(--radius) 0;padding:12px 15px;margin-bottom:18px;font-size:.93em;color:var(--primary);line-height:1.7;}
.tip2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.tip2 div{border-radius:8px;padding:8px;font-size:.84em;font-weight:700;text-align:center;line-height:1.5;}
/* 連立方程式（中かっこ） */
.sys{display:inline-flex;align-items:center;gap:0;margin:5px 0 10px;}
.sys.g .sys-brace{color:#15803d;}
.sys-brace{font-size:2.8em;line-height:1;color:var(--primary);font-weight:300;font-family:'Times New Roman','Georgia',serif;margin-right:4px;align-self:center;}
.sys-lines{display:inline-grid;gap:0;}
.sys-eq{font-size:.93em;font-weight:700;line-height:2.3;}
.eq-no{font-size:.7em;color:var(--text-sub);margin-left:7px;}
/* 分数 */
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 3px;line-height:1.1;}
.frac .fn{border-bottom:2px solid currentColor;padding:0 4px 1px;text-align:center;min-width:1.1em;}
.frac .fd{padding:1px 4px 0;text-align:center;min-width:1.1em;}
/* ナビボタン */
.nav-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;margin-top:26px;}
.btn-nav{font-family:'BIZ UDPGothic','BIZ UDP Gothic',sans-serif;font-size:.93em;font-weight:700;padding:11px 24px;border-radius:50px;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .15s,box-shadow .15s;}
.btn-nav:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.btn-f{background:var(--primary);color:#fff;}
.btn-b{background:#f1f5f9;color:var(--text-sub);}
.btn-s{background:var(--success);color:#fff;}
.btn-h{background:#e0e7ff;color:#3730a3;font-size:.83em;padding:9px 18px;}

.ex-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
.ex-head{padding:10px 15px;font-size:.86em;font-weight:700;display:flex;align-items:center;gap:8px;}
.ex-head.blue{background:var(--primary);color:#fff;}
.ex-head.green{background:#15803d;color:#fff;}
.ex-num{background:rgba(255,255,255,.25);border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:.78em;flex-shrink:0;}
.ex-body{padding:14px 16px 8px;}
.sr{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:8px;margin-bottom:7px;font-size:.88em;font-weight:700;line-height:2.1;animation:fadeIn .3s ease;}
.sr.y{background:var(--warn-light);border:1.5px solid var(--warn);}
.sr.b{background:var(--primary-light);border:1.5px solid var(--primary);}
.sr.g{background:var(--success-light);border:1.5px solid var(--success);}
.sl{font-size:.68em;font-weight:700;border-radius:5px;padding:2px 7px;white-space:nowrap;flex-shrink:0;margin-top:4px;}
.sl.y{background:var(--warn);color:#fff;}
.sl.b{background:var(--primary);color:#fff;}
.sl.g{background:var(--success);color:#fff;}
.ans-box{background:var(--primary-light);border:2px solid var(--primary);border-radius:9px;padding:10px 14px;margin-bottom:8px;font-size:1.05em;font-weight:700;color:var(--primary);text-align:center;line-height:2.1;animation:fadeIn .3s ease;}
.next-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:11px;font-family:'BIZ UDPGothic',sans-serif;font-size:.93em;font-weight:700;cursor:pointer;margin-bottom:11px;transition:background .15s;}
.next-btn:hover{background:#1648cc;}
.done-badge{text-align:center;padding:6px;font-size:.84em;font-weight:700;color:var(--success);margin-bottom:10px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="page-header">
  <div class="unit-code">MF02</div>

</div>

<nav class="step-nav" style="border-top:1px solid var(--border);"><div class="step-item"><span class="step-circle">①</span><a href="intro.html">導入</a></div><span class="step-arrow">›</span><div class="step-item active"><span class="step-circle">②</span><span>例題</span></div><span class="step-arrow">›</span><div class="step-item"><span class="step-circle">③</span><a href="drill.html">演習</a></div><span class="step-arrow">›</span><div class="step-item"><span class="step-circle">④</span><a href="check.html">確認</a></div></nav>
<main class="g-container">
<div class="instruction"><strong>【例題】</strong>　ボタンをタップして，考え方 → 答えの順に確認しよう！</div>
<div class="tip2"><div style="background:var(--primary-light);color:var(--primary);">①－②　同じ係数の文字を消す</div><div style="background:var(--accent-light);color:var(--accent);">同符号・同じ係数の文字に着目！</div></div><div id="ex-area"></div>
<div class="nav-btns"><a href="../../index.html" class="btn-nav btn-h">🏠 単元一覧へ</a><a href="intro.html" class="btn-nav btn-b">← ← 導入</a><a href="drill.html" class="btn-nav btn-f">③ 演習へ →</a></div>
</main>
<script>

const EXAMPLES=[{title:"\u2460\uff0d\u2461\u3067\uff59\u3092\u6d88\u3059\uff08\u57fa\u672c\uff09",head_cls:"blue",q:"<div class=\"sys\"><span class=\"sys-brace\">&#123;</span><div class=\"sys-lines\"><div class=\"sys-eq\">5\u03c7\uff0b2\uff59\uff1d\uff0d1<span class=\"eq-no\">\u2026\u2026\u2460</span></div><div class=\"sys-eq\">3\u03c7\uff0b2\uff59\uff1d\u30001<span class=\"eq-no\">\u2026\u2026\u2461</span></div></div></div>",steps:[{cls:"y",lbl:"\u7740\u76ee",txt:"\uff59\u306e\u4fc2\u6570\u304c\u4e21\u65b9 <strong>\uff0b2</strong> \u2192 \u2460\uff0d\u2461 \u3067\uff59\u304c\u6d88\u3048\u308b"},{cls:"b",lbl:"\u2460\uff0d\u2461",txt:"\uff085\u03c7\uff0b2\uff59\uff09\uff0d\uff083\u03c7\uff0b2\uff59\uff09\uff1d\uff0d1\uff0d1\u3000\u2192\u3000<strong>2\u03c7\uff1d\uff0d2\u3000\u2192\u3000\u03c7\uff1d\uff0d1</strong>"},{cls:"g",lbl:"\u4ee3\u5165",txt:"\u03c7\uff1d\uff0d1 \u3092\u2461 \u3078\uff1a3\u00d7(\uff0d1)\uff0b2\uff59\uff1d1\u3000\u2192\u30002\uff59\uff1d4\u3000\u2192\u3000<strong>\uff59\uff1d2</strong>"}],ans:"(\u03c7\uff0c\uff59)\uff1d<strong>(\uff0d1\uff0c2)</strong>"},{title:"\u2460\uff0d\u2461\u3067\uff59\u3092\u6d88\u3059\uff08\u4fc2\u6570\u304c\uff0b3\uff09",head_cls:"blue",q:"<div class=\"sys\"><span class=\"sys-brace\">&#123;</span><div class=\"sys-lines\"><div class=\"sys-eq\">4\u03c7\uff0b3\uff59\uff1d17<span class=\"eq-no\">\u2026\u2026\u2460</span></div><div class=\"sys-eq\">7\u03c7\uff0b3\uff59\uff1d23<span class=\"eq-no\">\u2026\u2026\u2461</span></div></div></div>",steps:[{cls:"y",lbl:"\u7740\u76ee",txt:"\uff59\u306e\u4fc2\u6570\u304c\u4e21\u65b9 <strong>\uff0b3</strong> \u2192 \u2460\uff0d\u2461 \u3067\uff59\u304c\u6d88\u3048\u308b"},{cls:"b",lbl:"\u2460\uff0d\u2461",txt:"4\u03c7\uff0d7\u03c7\uff1d17\uff0d23\u3000\u2192\u3000<strong>\uff0d3\u03c7\uff1d\uff0d6\u3000\u2192\u3000\u03c7\uff1d2</strong>"},{cls:"g",lbl:"\u4ee3\u5165",txt:"\u03c7\uff1d2 \u3092\u2460 \u3078\uff1a8\uff0b3\uff59\uff1d17\u3000\u2192\u3000<strong>\uff59\uff1d3</strong>"}],ans:"(\u03c7\uff0c\uff59)\uff1d<strong>(2\uff0c3)</strong>"},{title:"\u2460\uff0d\u2461\u3067\uff59\u3092\u6d88\u3059\uff08\u4fc2\u6570\u304c\uff0d1\uff09",head_cls:"blue",q:"<div class=\"sys\"><span class=\"sys-brace\">&#123;</span><div class=\"sys-lines\"><div class=\"sys-eq\">5\u03c7\uff0d\uff59\uff1d 3<span class=\"eq-no\">\u2026\u2026\u2460</span></div><div class=\"sys-eq\">\u03c7\uff0d\uff59\uff1d\uff0d5<span class=\"eq-no\">\u2026\u2026\u2461</span></div></div></div>",steps:[{cls:"y",lbl:"\u7740\u76ee",txt:"\uff59\u306e\u4fc2\u6570\u304c\u4e21\u65b9 <strong>\uff0d1</strong> \u2192 \u2460\uff0d\u2461 \u3067\uff59\u304c\u6d88\u3048\u308b"},{cls:"b",lbl:"\u2460\uff0d\u2461",txt:"5\u03c7\uff0d\u03c7\uff1d3\uff0d(\uff0d5)\u3000\u2192\u3000<strong>4\u03c7\uff1d8\u3000\u2192\u3000\u03c7\uff1d2</strong>"},{cls:"g",lbl:"\u4ee3\u5165",txt:"\u03c7\uff1d2 \u3092\u2461 \u3078\uff1a2\uff0d\uff59\uff1d\uff0d5\u3000\u2192\u3000<strong>\uff59\uff1d7</strong>"}],ans:"(\u03c7\uff0c\uff59)\uff1d<strong>(2\uff0c7)</strong>"},{title:"\u2460\uff0d\u2461\u3067\u03c7\u3092\u6d88\u3059\uff08\u4fc2\u6570\u304c\uff0b3\uff09",head_cls:"blue",q:"<div class=\"sys\"><span class=\"sys-brace\">&#123;</span><div class=\"sys-lines\"><div class=\"sys-eq\">3\u03c7\uff0b\uff59\uff1d5<span class=\"eq-no\">\u2026\u2026\u2460</span></div><div class=\"sys-eq\">3\u03c7\uff0b2\uff59\uff1d4<span class=\"eq-no\">\u2026\u2026\u2461</span></div></div></div>",steps:[{cls:"y",lbl:"\u7740\u76ee",txt:"\u03c7\u306e\u4fc2\u6570\u304c\u4e21\u65b9 <strong>\uff0b3</strong> \u2192 \u2460\uff0d\u2461 \u3067\u03c7\u304c\u6d88\u3048\u308b"},{cls:"b",lbl:"\u2460\uff0d\u2461",txt:"\uff59\uff0d2\uff59\uff1d5\uff0d4\u3000\u2192\u3000<strong>\uff0d\uff59\uff1d1\u3000\u2192\u3000\uff59\uff1d\uff0d1</strong>"},{cls:"g",lbl:"\u4ee3\u5165",txt:"\uff59\uff1d\uff0d1 \u3092\u2460 \u3078\uff1a3\u03c7\uff0d1\uff1d5\u3000\u2192\u3000<strong>\u03c7\uff1d2</strong>"}],ans:"(\u03c7\uff0c\uff59)\uff1d<strong>(2\uff0c\uff0d1)</strong>"}];
const state=EXAMPLES.map(()=>0);
function buildAll(){
  const area=document.getElementById('ex-area');
  EXAMPLES.forEach((ex,i)=>{
    const div=document.createElement('div');
    div.className='ex-card';div.id='ec'+i;
    div.innerHTML='<div class="ex-head '+ex.head_cls+'">'
      +'<span class="ex-num">'+(i+1)+'</span>'+ex.title+'</div>'
      +'<div class="ex-body">'+ex.q
      +'<div id="steps'+i+'"></div>'
      +'<button class="next-btn" id="btn'+i+'" onclick="nextStep('+i+')">💡 考え方を見る</button>'
      +'<div id="done'+i+'" class="done-badge" style="display:none;">✅ 完了！</div>'
      +'</div>';
    area.appendChild(div);
  });
}
function nextStep(i){
  const ex=EXAMPLES[i],cur=state[i];
  const sd=document.getElementById('steps'+i);
  const btn=document.getElementById('btn'+i);
  const done=document.getElementById('done'+i);
  if(cur<ex.steps.length){
    const s=ex.steps[cur];
    const row=document.createElement('div');
    row.className='sr '+s.cls;
    row.innerHTML='<span class="sl '+s.cls+'">'+s.lbl+'</span><div>'+s.txt+'</div>';
    sd.appendChild(row);state[i]++;
    btn.textContent=state[i]<ex.steps.length?'➡ 次のステップへ':'✅ 答えを見る';
  }else{
    const ab=document.createElement('div');
    ab.className='ans-box';ab.innerHTML='答え：'+ex.ans;
    sd.appendChild(ab);btn.style.display='none';done.style.display='block';
  }
}
buildAll();

</script>
<script src="../../gamba_support.js"></script>
