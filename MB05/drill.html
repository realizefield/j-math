<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB05 分数の正負の計算 【演習】</title>
<style>
:root{--primary:#1a56a0;--primary-light:#dbeafe;--primary-mid:#3b82f6;--accent:#e8372d;--accent-light:#fff1f0;--success:#16a34a;--success-light:#dcfce7;--warn:#d97706;--warn-light:#fffbeb;--bg:#f0f6ff;--card:#ffffff;--border:#c7d9f5;--text:#1e293b;--text-sub:#64748b;--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'BIZ UDPGothic','BIZ UDP Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
.g-container{max-width:760px;margin:0 auto;padding:24px 16px 60px;}
.page-header{background:var(--primary);color:#fff;padding:18px 24px 14px;text-align:center;box-shadow:0 3px 10px rgba(26,86,160,.25);}
.page-header .unit-code{font-size:.82em;opacity:.8;letter-spacing:.1em;margin-bottom:4px;}
.page-header h1{font-size:clamp(1.1em,3vw,1.55em);font-weight:700;margin:0;}
.step-nav{display:flex;align-items:center;justify-content:center;padding:14px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;position:sticky;top:0;z-index:10;}
.step-item{display:flex;align-items:center;gap:6px;font-size:clamp(.75em,2vw,.88em);color:#94a3b8;white-space:nowrap;padding:4px 6px;}
.step-item a{color:inherit;text-decoration:none;}
.step-item.active{color:var(--primary);font-weight:700;}
.step-circle{width:22px;height:22px;border-radius:50%;font-size:.76em;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-item.active .step-circle{background:var(--primary);color:#fff;box-shadow:0 0 0 3px var(--primary-light);}
.step-item:not(.active) .step-circle{background:#94a3b8;color:#fff;}
.step-arrow{color:#cbd5e1;font-size:1.1em;padding:0 2px;user-select:none;}
.instruction{background:var(--primary-light);border-left:4px solid var(--primary);border-radius:0 var(--radius) var(--radius) 0;padding:13px 16px;margin-bottom:20px;font-size:.95em;color:var(--primary);line-height:1.7;}
.problem-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;}
.problem-head{display:flex;align-items:center;padding:16px 20px;gap:10px;flex-wrap:wrap;}
.ans-toggle{margin-left:auto;background:none;border:1.5px solid #94a3b8;border-radius:20px;padding:5px 12px;font-family:'BIZ UDPGothic',sans-serif;font-size:.8em;color:var(--text-sub);cursor:pointer;transition:all .18s;white-space:nowrap;}
.nav-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;margin-top:28px;}
.btn-nav{font-family:'BIZ UDPGothic','BIZ UDP Gothic',sans-serif;font-size:.95em;font-weight:700;padding:12px 28px;border-radius:50px;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .15s,box-shadow .15s;}
.btn-nav:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.btn-back{background:#f1f5f9;color:var(--text-sub);}
.btn-forward{background:var(--primary);color:#fff;}
.btn-home{background:#e0e7ff;color:#3730a3;font-size:.85em;padding:10px 20px;}
.frac{display:inline-flex;flex-direction:column;align-items:center;line-height:1.1;vertical-align:middle;margin:0 2px;}
.frac .fn,.frac .fd{font-size:clamp(.95em,2.5vw,1.25em);font-weight:700;padding:1px 5px;min-width:22px;text-align:center;}
.frac .fb{width:100%;height:2.5px;background:var(--text);border-radius:2px;margin:2px 0;}
.frac.sm .fn,.frac.sm .fd{font-size:.82em;padding:0 3px;min-width:16px;}
.frac-input{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 4px;}
.frac-input input{width:clamp(42px,8vw,56px);height:clamp(34px,6vw,44px);text-align:center;font-size:clamp(.88em,2vw,1.1em);font-weight:700;font-family:'BIZ UDPGothic',sans-serif;border:2.5px solid var(--primary);border-radius:8px;background:#f0f6ff;color:var(--primary);outline:none;-moz-appearance:textfield;}
.frac-input input::-webkit-inner-spin-button,.frac-input input::-webkit-outer-spin-button{-webkit-appearance:none;}
.frac-input input.correct{border-color:var(--success);background:var(--success-light);color:var(--success);}
.frac-input input.wrong{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.frac-input .fb{width:100%;height:2.5px;background:var(--text);border-radius:2px;margin:2px 0;}
.op{font-size:clamp(1em,2.5vw,1.4em);font-weight:700;color:var(--text-sub);margin:0 3px;}
.eq{font-size:clamp(1em,2.5vw,1.4em);font-weight:700;color:var(--text-sub);margin:0 4px;}
.step-row{display:flex;align-items:center;flex-wrap:wrap;gap:5px;padding:7px 10px;border-radius:8px;margin-bottom:5px;font-size:.88em;font-weight:700;}
.step-row.y{background:var(--warn-light);border:1.5px solid var(--warn);}
.step-row.b{background:var(--primary-light);border:1.5px solid var(--primary);}
.step-row.g{background:var(--success-light);border:1.5px solid var(--success);}
.tag{font-size:.7em;font-weight:700;border-radius:6px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.tag.y{background:var(--warn);color:#fff;}
.tag.b{background:var(--primary);color:#fff;}
.tag.g{background:var(--success);color:#fff;}
</style>
</head>
<body>
<div class="page-header">
  <div class="unit-code">MB05</div>
  <h1>分数の正負の計算　【演習】</h1>
</div>
<nav class="step-nav">
  <div class="step-item"><span class="step-circle">①</span><a href="intro.html">導入</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">②</span><a href="example.html">例題</a></div>
  <span class="step-arrow">›</span>
  <div class="step-item active"><span class="step-circle">③</span><span>演習</span></div>
  <span class="step-arrow">›</span>
  <div class="step-item"><span class="step-circle">④</span><a href="check.html">確認</a></div>
</nav>
<main class="g-container">
  <div class="instruction">
    <strong>【演習】</strong>　分子・分母を別々に入力してください。マイナスは分子に入力！
  </div>
  <div id="problems-area"></div>
  <div class="nav-btns">
    <a href="../index.html" class="btn-nav btn-home">🏠 単元一覧へ</a>
    <a href="example.html" class="btn-nav btn-back">← 例題にもどる</a>
    <a href="check.html" class="btn-nav btn-forward">④ 確認テストへ →</a>
  </div>
</main>
<script src="mb05_sets.js"></script>
<script>
const setIndex = Math.floor(Math.random() * MB05_DRILL_SETS.length);
const problems = MB05_DRILL_SETS[setIndex].problems;

function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a;}

function fracHTML(neg, n, d, color=''){
  const c = color || (neg ? 'var(--accent)' : 'var(--text)');
  return `${neg?`<span style="font-size:clamp(1em,2.5vw,1.4em);font-weight:700;color:${c};">−</span>`:''}
    <span class="frac"><span class="fn" style="color:${c};">${n}</span><span class="fb"></span><span class="fd">${d}</span></span>`;
}

function buildProblems() {
  const area = document.getElementById('problems-area');
  area.innerHTML = '';
  problems.forEach((p, i) => {
    let qHTML = '';
    if (p.type === 'A') {
      qHTML = `${fracHTML(true, p.a_n, p.a_d)} <span class="op">＋</span> ${fracHTML(false, p.b_n, p.b_d)}`;
    } else if (p.type === 'B') {
      qHTML = `${fracHTML(true, p.a_n, p.a_d)} <span class="op">−</span> ${fracHTML(false, p.b_n, p.b_d)}`;
    } else {
      qHTML = `${fracHTML(true, p.a_n, p.a_d)} <span class="op">−</span> <span style="font-size:clamp(1em,2.5vw,1.4em);">（</span>${fracHTML(true, p.b_n, p.b_d)}<span style="font-size:clamp(1em,2.5vw,1.4em);">）</span>`;
    }
    area.innerHTML += `
      <div class="problem-card" id="card${i}">
        <div class="problem-head">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;">
            ${qHTML}
            <span class="eq">＝</span>
            <div class="frac-input">
              <input type="number" id="inp${i}n" placeholder="分子">
              <div class="fb"></div>
              <input type="number" id="inp${i}d" placeholder="分母">
            </div>
          </div>
          <button class="ans-toggle" onclick="toggleExplain(${i})">答を見る</button>
        </div>
        <div id="expl${i}" style="display:none;padding:0 14px 14px;"></div>
      </div>`;
  });
}

function explainHTML(p, isOk, hasInput) {
  const ansNeg = p.ans_neg;
  let html = '';
  if (hasInput) {
    html += isOk
      ? `<div style="background:var(--success-light);border:2px solid var(--success);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-weight:700;color:var(--success);">⭕ 正解！</div>`
      : `<div style="background:var(--accent-light);border:2px solid var(--accent);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-weight:700;color:var(--accent);">❌ 正解は ${ansNeg?'<span style="color:var(--accent);font-weight:700;">−</span>':''}<span class="frac" style="display:inline-flex;"><span class="fn" style="color:var(--accent);">${p.ans_n}</span><span class="fb"></span><span class="fd">${p.ans_d}</span></span></div>`;
  } else {
    html += `<div style="background:var(--primary-light);border:2px solid var(--primary);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-weight:700;color:var(--primary);">正解：${ansNeg?'<span style="color:var(--accent);font-weight:700;">−</span>':''}<span class="frac" style="display:inline-flex;"><span class="fn" style="color:var(--accent);">${p.ans_n}</span><span class="fb"></span><span class="fd">${p.ans_d}</span></span></div>`;
  }
  if (p.type === 'C') {
    html += `<div class="step-row y"><span class="tag y">変換</span>
      <span style="font-weight:700;">−（−<span class="frac" style="display:inline-flex;vertical-align:middle;"><span class="fn" style="color:var(--accent);">${p.b_n}</span><span class="fb"></span><span class="fd">${p.b_d}</span></span>）＝
      <span style="color:var(--success);">＋</span><span class="frac" style="display:inline-flex;vertical-align:middle;"><span class="fn" style="color:var(--success);">${p.b_n}</span><span class="fb"></span><span class="fd">${p.b_d}</span></span></span>
    </div>`;
  }
  html += `
    <div class="step-row y"><span class="tag y">通分</span> 最小公倍数 → <strong style="color:var(--warn);">${p.lcm}</strong></div>
    <div class="step-row b"><span class="tag b">計算</span> ${p.a_num} ${p.type==='B'?'−':'＋'} ${p.type==='B'?p.b_num:Math.abs(p.b_num)} ＝ <strong style="color:var(--accent);">${p.a_num+(p.type==='B'?-p.b_num:p.b_num)}</strong></div>
    <div class="step-row g"><span class="tag g">答え</span>
      ${ansNeg
        ? `<span style="color:var(--accent);font-weight:700;font-size:1.1em;">−</span><span class="frac" style="display:inline-flex;"><span class="fn" style="color:var(--accent);">${p.ans_n}</span><span class="fb"></span><span class="fd">${p.ans_d}</span></span>`
        : `<span class="frac" style="display:inline-flex;"><span class="fn" style="color:var(--success);">${p.ans_n}</span><span class="fb"></span><span class="fd">${p.ans_d}</span></span>`
      }
    </div>`;
  return html;
}

function toggleExplain(i) {
  const p = problems[i];
  const expl = document.getElementById('expl'+i);
  const btn  = document.querySelector('#card'+i+' .ans-toggle');
  const inpN = document.getElementById('inp'+i+'n');
  const inpD = document.getElementById('inp'+i+'d');
  if (expl.style.display === 'block') { expl.style.display='none'; btn.textContent='答を見る'; return; }
  const n = parseInt(inpN.value);
  const d = parseInt(inpD.value);
  const hasInput = !isNaN(n) && !isNaN(d);
  const correctN = p.ans_neg ? -p.ans_n : p.ans_n;
  const isOk = hasInput && d !== 0 && n * p.ans_d === correctN * d && Math.sign(n) === Math.sign(correctN);
  inpN.classList.remove('correct','wrong');
  inpD.classList.remove('correct','wrong');
  if (hasInput) { const cls = isOk?'correct':'wrong'; inpN.classList.add(cls); inpD.classList.add(cls); }
  expl.innerHTML = explainHTML(p, isOk, hasInput);
  expl.style.display = 'block';
  btn.textContent = '答を隠す';
}
buildProblems();
</script>
<script src="../gamba_support.js"></script>
</body>
</html>
